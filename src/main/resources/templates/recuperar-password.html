<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar - Mercaplasticos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="contenedorMain">
    <section class="contenedorInicioSesion">
        <div class="containerParrafologo">
            <img th:src="@{/img/logo.png}" class="logo" alt="Logo Mercaplasticos" style="width: 80px;">
        </div>

        <div class="containerTitleInicio">
            <h1 class="titleInicio">RESTABLECER CLAVE</h1>
        </div>

        <div th:if="${mensaje}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin: 10px; font-size: 0.8rem;">
            <p th:text="${mensaje}"></p>
        </div>
        <div th:if="${error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin: 10px; font-size: 0.8rem;">
            <p th:text="${error}"></p>
        </div>

        <p class="textoSeparador" style="margin-bottom: 20px; padding: 0 20px; text-align: center;">
            Se enviará una alerta de seguridad al administrador para validar su cuenta.
        </p>

        <form th:action="@{/recuperar/enviar}" method="post">
            <div class="containerBotonUsuario" style="display: flex; flex-direction: column; align-items: center;">
                <label class="textoUsuario" style="width: 270px; text-align: left;">Correo Electrónico</label>
                <input type="email" name="correo" class="botonUsuario"
                       placeholder="ejemplo@mercaplasticos.com"
                       style="border: 1px solid #ccc; width: 270px;" required>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button type="submit" class="botonSiguiente" style="width: 270px;">ENVIAR INSTRUCCIONES</button>
            </div>
        </form>
        <div class="separador">
            <hr>
            <a th:href="@{/}" class="textoSeparador">← VOLVER AL INICIO</a>
        </div>
    </section>
</main>
</body>
</html>
