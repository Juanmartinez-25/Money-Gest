<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Gastos - Merca-plasticos</title>
    <link rel="stylesheet" th:href="@{/css/menuLateral.css}">
    <link rel="stylesheet" th:href="@{/css/gestionGastos.css(v=${#dates.createNow().getTime()})}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="contenedor">

    <aside th:replace="~{fragments/menuLateral :: menuLateral}"></aside>

    <main class="contenido">
        <header class="top-header">
            <h1>Gestión de gastos</h1>
        </header>

        <div class="content-wrapper">
            <section class="filters-section">
                <div class="filter-row">
                    <div class="filter-group"><label>Fecha desde:</label><input type="date" id="fechaDesde"></div>
                    <div class="filter-group"><label>Fecha hasta:</label><input type="date" id="fechaHasta"></div>
                    <div class="filter-group">
                        <label>Unidad de Negocio:</label>
                        <select id="unidadNegocioFiltro">
                            <option value="">Todas...</option>
                            <option value="Principal">Principal</option>
                            <option value="Sucursal">Sucursal</option>
                        </select>
                    </div>
                </div>
            </section>

            <div class="dashboard-layout">
                <aside class="action-panel">
                    <div class="action-box">
                        <h3>NUEVO REGISTRO DE</h3>
                        <div class="action-buttons">
                            <button type="button" onclick="abrirModalGasto('Registro de Gastos')">[Registro de Gastos]</button>
                            <button type="button" onclick="abrirModalGasto('Proveedores')">[Proveedores]</button>
                            <button type="button" onclick="abrirModalGasto('Nómina')">[Nómina]</button>
                            <button type="button" onclick="abrirModalGasto('Créditos y Finanzas')">[Créditos y Finanzas]</button>
                            <button type="button" onclick="abrirModalGasto('Inventario Dañado')">[Inventario Dañado]</button>
                        </div>
                    </div>
                </aside>

                <div class="highlight-card" style="background-color: #e8f4fd; border-left: 5px solid #2b5c8f; border-radius: 5px; height: fit-content;">
                    <h4 style="font-weight: bold; color: #555;">SALDO TOTAL DISPONIBLE</h4>
                    <h2 id="saldoDisponibleTexto" class="amount-large" style="color: #2b5c8f; font-size: 2.5rem;">$ 0</h2>
                    <i class="fa-solid fa-wallet card-icon" style="color: rgba(43, 92, 143, 0.2);"></i>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modalNuevoGasto" class="modal-gasto-oculto">
    <div class="modal-gasto-contenido">
        <span class="cerrar-modal" onclick="cerrarModalGasto()">&times;</span>
        <h2 id="tituloModalGasto">Nuevo Registro</h2>
        <form id="formNuevoGasto">
            <input type="hidden" id="subcategoriaGasto" value="General">

            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="descGasto" placeholder="Ej. Pago recibo luz" required>
            </div>
            <div class="form-group">
                <label>Monto</label>
                <input type="number" id="montoGasto" placeholder="0.00" required step="0.01">
            </div>
            <div class="form-group">
                <label>Unidad de Negocio</label>
                <select id="unidadGasto">
                    <option value="Principal">Principal</option>
                    <option value="Sucursal">Sucursal</option>
                </select>
            </div>
            <button type="button" class="btn-guardar-gasto" onclick="enviarFormularioGasto()">Guardar Gasto</button>
        </form>
    </div>
</div>
<script th:src="@{/js/gestionGastos.js}"></script>
</body>
</html>
