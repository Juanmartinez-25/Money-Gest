<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Gastos - Merca-plasticos</title>
    <link rel="stylesheet" th:href="@{/css/menuLateral.css}">
    <link rel="stylesheet" th:href="@{/css/gestionGastos.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="contenedor">

    <aside th:replace="~{fragments/menuLateral :: menuLateral}"></aside>

    <main class="contenido">
        <header class="top-header">
            <h1>Gestión de gastos</h1>
        </header>

        <div class="content-wrapper">
            <section class="filters-section">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Fecha desde:</label>
                        <input type="date" id="fechaDesde">
                    </div>
                    <div class="filter-group">
                        <label>Estado:</label>
                        <select id="estado">
                            <option value="">Seleccione...</option>
                            <option value="Aprobado">Aprobado</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Categoría:</label>
                        <select id="categoria"><option value="">Seleccione...</option></select>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>Fecha hasta:</label>
                        <input type="date" id="fechaHasta">
                    </div>
                    <div class="filter-group">
                        <label>Unidad de Negocio:</label>
                        <select id="unidadNegocio">
                            <option value="">Seleccione...</option>
                            <option value="Principal">Principal</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Subcategoría:</label>
                        <select id="subcategoria"><option value="">Seleccione...</option></select>
                    </div>
                </div>
            </section>

            <div class="dashboard-layout">
                <aside class="action-panel">
                    <div class="action-box">
                        <h3>NUEVO REGISTRO DE</h3>
                        <div class="action-buttons">
                            <button type="button" onclick="abrirModalGasto()">[Registro de Gastos]</button>
                            <button type="button">[Proveedores]</button>
                            <button type="button">[Nómina]</button>
                            <button type="button">[Créditos y Finanzas]</button>
                            <button type="button">[Inventario Dañado]</button>
                        </div>
                    </div>
                    <div class="kpi-box">
                        <button type="button" class="btn-kpi">[Indicadores KPIs]</button>
                    </div>
                </aside>

                <section class="kpi-single-section">
                    <div class="kpi-card highlight-card">
                        <h4>SALDO DISPONIBLE</h4>
                        <p class="amount-large" id="saldoDisponibleTexto"
                           th:text="${#numbers.formatCurrency(saldo)}">$0.00</p>
                        <i class="fa-solid fa-money-bill-trend-up card-icon"></i>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/gestionGastos.js}"></script>
</body>
</html>
