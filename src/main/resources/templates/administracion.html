<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control Administrativo - MoneyGest</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .campo-password { position: relative; display: flex; align-items: center; width: 100%; }
        .toggle-password { position: absolute; right: 15px; cursor: pointer; color: #666; z-index: 10; }
        .tabla-admin { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        .tabla-admin th { background-color: #2c3e50; color: white; padding: 12px; }
        .tabla-admin td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .btn-accion { border: none; background: none; cursor: pointer; font-size: 1.1rem; padding: 5px; }
        .alerta-pendiente { background: #fff3cd; color: #856404; padding: 5px; border-radius: 5px; font-weight: bold; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
<main class="contenedorMain">
    <section class="contenedorInicioSesion" style="max-width: 1100px; width: 95%;">
        <div class="containerHeader">
            <img class="logo" th:src="@{/img/Logo.png}" alt="Logo" style="width: 60px;">
            <h2 style="font-family: var(--fuente-aleo); margin-left: 20px;">Panel de Control Administrativo</h2>
        </div>

        <div th:if="${mensaje}" style="background: #d4edda; color: #155724; padding: 10px; border-radius: 8px; margin-bottom: 10px;" th:text="${mensaje}"></div>
        <div th:if="${error}" style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin-bottom: 10px;" th:text="${error}"></div>

        <div class="seccion-crear" style="background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-bottom: 20px;">Registrar Nuevo Colaborador</h3>
            <form th:action="@{/admin/usuarios/crear}" method="post" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <input type="text" name="nombre" placeholder="Nombre completo" class="botonUsuario" required>
                <input type="email" name="correo" placeholder="correo@moneygest.com" class="botonUsuario" required>
                <div class="campo-password">
                    <input type="password" name="contrasena" id="p1" placeholder="Contraseña" class="botonUsuario" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="toggle('p1')"></i>
                </div>
                <div class="campo-password">
                    <input type="password" name="confirmarContrasena" id="p2" placeholder="Confirmar Contraseña" class="botonUsuario" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="toggle('p2')"></i>
                </div>
                <button type="submit" class="botonSiguiente" style="grid-column: span 2; margin-top: 10px;">Registrar e Iniciar Acceso</button>
            </form>
        </div>

        <div class="seccion-tabla" style="background: white; padding: 20px; border-radius: 15px;">
            <table class="tabla-admin">
                <thead>
                <tr>
                    <th style="text-align: left;">Nombre / Correo</th>
                    <th>Rol Actual</th>
                    <th>Nueva Clave</th>
                    <th>Alertas</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${usuarios}">
                    <form th:action="@{/admin/usuarios/editar-completo}" method="post">
                        <input type="hidden" name="id" th:value="${u.id}">
                        <td style="text-align: left;">
                            <strong th:text="${u.nombre}"></strong><br>
                            <small th:text="${u.correo}"></small>
                        </td>
                        <td>
                            <select name="nuevoRol" class="botonUsuario" style="padding: 5px; width: auto;">
                                <option th:each="r : ${roles}"
                                        th:value="${r.nombre}"
                                        th:text="${r.nombre}"
                                        th:selected="${u.idRol != null and u.idRol == r.id}">
                                </option>
                            </select>
                        </td>
                        <td>
                            <input type="password" name="nuevaPassword" placeholder="Cambiar..." style="width: 100px;">
                        </td>
                        <td>
                            <div th:if="${u.solicitudCambioClave}" class="alerta-pendiente">
                                <i class="fa-solid fa-bell"></i> REESTABLECER
                            </div>
                            <span th:unless="${u.solicitudCambioClave}" style="color: #ccc;">-</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 15px; justify-content: center;">
                                <button type="submit" class="btn-accion" style="color: #3498db;"><i class="fa-solid fa-floppy-disk"></i></button>
                                <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.id})}" class="btn-accion" style="color: #dc3545;" onclick="return confirm('¿Eliminar?')"><i class="fa-solid fa-trash"></i></a>
                            </div>
                        </td>
                    </form>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="separador"><hr><a th:href="@{/menuPrincipal}" class="textoSeparador">Volver al Dashboard</a></div>
    </section>
</main>
<script>
    function toggle(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }
</script>
</body>
</html>
