<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas - Merca-plasticos</title>
    <link rel="stylesheet" th:href="@{/css/menuLateral.css}">
    <link rel="stylesheet" th:href="@{/css/gestionVentas.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="contenedor">
    <aside th:replace="~{fragments/menuLateral :: menuLateral}"></aside>

    <main class="contenido mockup-bg">
        <header class="mockup-header">
            <h1>Gestión de ventas</h1>
        </header>

        <form class="mockup-form" th:action="@{/ventas/guardar}" th:object="${venta}" method="post">

            <div class="panel panel-top">
                <div class="col-left">
                    <div class="field-row">
                        <label>Numero de factura</label>
                        <input type="text" th:field="*{numeroFactura}" placeholder="Ej: 000808" required>
                    </div>
                    <div class="field-row">
                        <label><i class="fa-regular fa-calendar-alt"></i> Fecha</label>
                        <input type="date" th:field="*{fecha}" id="fechaInput" required>
                    </div>
                </div>
                <div class="col-right">
                    <div class="field-row">
                        <label>Nombre o razon social</label>
                        <input type="text" placeholder="Opcional">
                    </div>
                    <div class="field-row">
                        <label>N° de document o nit</label>
                        <input type="text" placeholder="Opcional">
                    </div>
                    <div class="field-row">
                        <label>metodo de pago</label>
                        <input type="text" th:field="*{metodoPago}" placeholder="Ej: efectivo">
                    </div>
                </div>
            </div>

            <div class="middle-grid">
                <div class="panel add-product">
                    <label>codigo de producto</label>
                    <input type="text" id="codigoInput" class="input-center" placeholder="Ej: 8085215">
                    <div class="qty-row">
                        <label>cantidad</label>
                        <input type="number" id="cantidadInput" class="input-center" style="width: 50px;" value="1" min="1">
                    </div>
                    <button type="button" class="btn-blue btn-add" onclick="agregarAlCarrito()">Agregar</button>
                </div>

                <div class="right-column">
                    <div class="panel product-list">
                        <h4>productos agregados</h4>
                        <table class="cart-table" id="tablaCarrito">
                        </table>
                    </div>

                    <div class="panel totals-area">
                        <div class="field-row-total">
                            <label>Sub total</label>
                            <input type="number" step="0.01" th:field="*{subtotal}" id="inputSubtotal" readonly>
                        </div>
                        <div class="field-row-total">
                            <label>Iva</label>
                            <input type="number" step="0.01" th:field="*{iva}" id="inputIva" readonly>
                        </div>
                        <div class="field-row-total">
                            <label>Total</label>
                            <input type="number" step="0.01" th:field="*{total}" id="inputTotal" readonly>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-actions">
                <button type="submit" class="btn-blue btn-large">Crear</button>
                <button type="button" class="btn-blue btn-large" onclick="limpiarPantalla()">Limpiar</button>
                <button type="button" class="btn-blue btn-large">Editar</button>
            </div>
        </form>
    </main>
</div>

<script th:src="@{/js/gestionVentas.js}"></script>
</body>
</html>
