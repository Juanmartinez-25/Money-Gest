<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Ventas</title>
    <link rel="stylesheet" th:href="@{/css/menuLateral.css}">
    <link rel="stylesheet" th:href="@{/css/gestionVentas.css}">
</head>
<body>
<div class="contenedor">

    <aside th:replace="fragments/menuLateral :: menuLateral"></aside>

    <main class="contenido">
        <div class="barra-superior">
            <h3>Gestión Ventas</h3>
        </div>

        <section class="contenido-ventas">

            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <div class="resumen-ventas">
                <h4>Total Ventas: <span th:text="${#numbers.formatDecimal(totalVentas, 0, 'COMMA', 2, 'POINT')}">0</span> COP</h4>
                <button class="btn-nueva" id="btnAbrirNueva">Nueva Venta</button>
            </div>

            <!-- Modal Nueva Venta -->
            <div id="modalNuevaVenta" class="modal">
                <div class="modal-contenido">
                    <span class="cerrar" id="cerrarNueva">&times;</span>
                    <h3>Nueva Venta</h3>
                    <form method="post" id="formNuevaVenta" action="/ventas/guardar">
                        <div class="form-group">
                            <label for="clienteNueva">Cliente:</label>
                            <input type="text" id="clienteNueva" name="cliente" required>
                        </div>
                        <div class="form-group">
                            <label for="descripcionNueva">Descripción:</label>
                            <input type="text" id="descripcionNueva" name="descripcion" required>
                        </div>
                        <div class="form-group">
                            <label for="montoNueva">Monto:</label>
                            <input type="number" id="montoNueva" name="monto" required>
                        </div>
                        <div class="form-group">
                            <label for="fechaNueva">Fecha:</label>
                            <input type="date" id="fechaNueva" name="fecha" required>
                        </div>
                        <div class="form-group">
                            <label for="usuarioNueva">Usuario:</label>
                            <select id="usuarioNueva" name="usuarioId" required>
                                <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.nombre}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn-nueva">Guardar</button>
                    </form>
                </div>
            </div>

            <!-- Tabla de ventas -->
            <div class="tabla-ventas">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Descripción</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                        <th>Usuario</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="v : ${ventas}">
                        <td th:text="${v.id}"></td>
                        <td th:text="${v.cliente}"></td>
                        <td th:text="${v.descripcion}"></td>
                        <td th:text="${#numbers.formatDecimal(v.monto, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${v.fecha}"></td>
                        <td th:text="${v.usuario.nombre}"></td>
                        <td>
                            <a th:href="@{'/ventas/eliminar/' + ${v.id}}" class="btn-eliminar"
                               onclick="return confirm('¿Eliminar esta venta?');">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(ventas)}">
                        <td colspan="7">No hay ventas registradas</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>
    </main>
</div>

<script src="/js/gestionVentas.js" th:src="@{/js/gestionVentas.js}"></script>
</body>
</html>
