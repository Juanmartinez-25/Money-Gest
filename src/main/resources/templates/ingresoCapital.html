<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso Capital</title>
    <!-- CSS global -->
    <link rel="stylesheet" th:href="@{/css/menuLateral.css}">
    <!-- CSS específico -->
    <link rel="stylesheet" th:href="@{/css/ingresoCapital.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="contenedor">

    <!-- Menú lateral reutilizando el fragment -->
    <aside th:replace="fragments/menuLateral :: menuLateral"></aside>

    <!-- Contenido principal -->
    <main class="contenido">
        <div class="barra-superior">
            <h3>Ingreso capital</h3>
        </div>

        <!-- Aquí va el formulario o contenido dinámico -->
        <section class="formulario-capital">
            <form>
                <label for="monto">Monto:</label>
                <input type="number" id="monto" name="monto" required>

                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" name="fecha" required>

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion"></textarea>

                <button type="submit">Registrar</button>
            </form>
        </section>
    </main>

</div>
</body>
</html>
